<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>複利試算 | 人生 × 金錢規劃</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #F8F6F2;
  --bg2: #FDFCFA;
  --card: #FFFFFF;
  --text: #403011;
  --text2: #7A6A4A;
  --text3: #A89880;
  --accent: #CC914D;
  --accent2: #E8AF3B;
  --sage: #626C3B;
  --slate: #6F8BAA;
  --border: #E8E2D8;
  --border2: #D4CCBE;
  --success-bg: #F0F5E8;
  --success: #4A6B28;
  --warning-bg: #FEF8EC;
  --warning: #8A5E00;
  --danger-bg: #FDF0EE;
  --danger: #8B2A1A;
  --info-bg: #EEF3F8;
  --info: #3A5F7A;
  --radius: 14px;
  --radius-sm: 8px;
  --shadow: 0 2px 16px rgba(64,48,17,0.07);
  --shadow-sm: 0 1px 6px rgba(64,48,17,0.06);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Noto Sans TC', -apple-system, sans-serif;
  background-color: var(--bg);
  color: var(--text);
  min-height: 100vh;
  position: relative;
  overflow-x: hidden;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    radial-gradient(ellipse 60% 40% at 80% 10%, rgba(204,145,77,0.06) 0%, transparent 70%),
    radial-gradient(ellipse 50% 50% at 10% 80%, rgba(111,139,170,0.05) 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
}

.grid-bg {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  overflow: hidden;
}

.grid-bg svg {
  width: 100%;
  height: 100%;
  opacity: 0.35;
}

.page {
  position: relative;
  z-index: 1;
  max-width: 560px;
  margin: 0 auto;
  padding: 2rem 1.25rem 3rem;
}

.header {
  margin-bottom: 2rem;
  text-align: center;
}

.brand-tag {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  color: var(--text3);
  letter-spacing: 0.08em;
  margin-bottom: 1.25rem;
  padding: 5px 14px;
  border: 1px solid var(--border);
  border-radius: 99px;
  background: rgba(255,255,255,0.7);
}

.brand-dot {
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: var(--accent);
}

.header h1 {
  font-size: clamp(22px, 5vw, 28px);
  font-weight: 500;
  color: var(--text);
  line-height: 1.4;
  margin-bottom: 10px;
}

.header h1 em {
  font-style: normal;
  color: var(--accent);
}

.header p {
  font-size: 14px;
  color: var(--text2);
  line-height: 1.7;
  max-width: 360px;
  margin: 0 auto;
}

.card {
  background: var(--card);
  border-radius: var(--radius);
  border: 1px solid var(--border);
  box-shadow: var(--shadow);
  padding: 1.5rem;
  margin-bottom: 1rem;
}

.section-label {
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.1em;
  color: var(--accent);
  text-transform: uppercase;
  margin-bottom: 1.25rem;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--border);
}

.field { margin-bottom: 1.25rem; }
.field:last-child { margin-bottom: 0; }

.field label {
  display: block;
  font-size: 13px;
  font-weight: 500;
  color: var(--text);
  margin-bottom: 4px;
}

.field .hint {
  font-size: 12px;
  color: var(--text3);
  margin-bottom: 8px;
  display: block;
}

.input-wrap {
  position: relative;
  display: flex;
  align-items: center;
}

.input-prefix, .input-suffix {
  position: absolute;
  font-size: 13px;
  color: var(--text3);
  pointer-events: none;
}

.input-prefix { left: 14px; }
.input-suffix { right: 14px; }

.field input {
  width: 100%;
  padding: 11px 14px;
  font-size: 14px;
  font-family: 'Noto Sans TC', sans-serif;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--bg2);
  color: var(--text);
  transition: border-color 0.15s, box-shadow 0.15s;
  -webkit-appearance: none;
  appearance: none;
}

.has-prefix input { padding-left: 34px; }
.has-suffix input { padding-right: 34px; }

.field input:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(204,145,77,0.12);
  background: #fff;
}

.field input.error {
  border-color: var(--danger);
  box-shadow: 0 0 0 3px rgba(139,42,26,0.08);
}

.field-error {
  font-size: 12px;
  color: var(--danger);
  margin-top: 5px;
  display: none;
}
.field-error.show { display: block; }

/* Rate Slider */
.rate-display {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 10px;
}

.rate-value {
  font-size: 22px;
  font-weight: 500;
  color: var(--accent);
}

.rate-badges {
  display: flex;
  gap: 6px;
}

.rate-badge {
  font-size: 11px;
  padding: 3px 10px;
  border-radius: 99px;
  border: 1px solid var(--border);
  background: var(--bg2);
  color: var(--text3);
  cursor: pointer;
  transition: all 0.15s;
}

.rate-badge:hover {
  border-color: var(--accent);
  color: var(--accent);
}

.rate-badge.active {
  background: rgba(204,145,77,0.1);
  border-color: var(--accent);
  color: var(--accent);
  font-weight: 500;
}

.slider-track {
  position: relative;
  height: 28px;
  display: flex;
  align-items: center;
  margin-bottom: 6px;
}

.slider-rail {
  position: absolute;
  left: 0;
  right: 0;
  height: 6px;
  background: var(--border);
  border-radius: 99px;
}

.slider-fill {
  position: absolute;
  left: 0;
  top: 0;
  height: 100%;
  background: linear-gradient(90deg, var(--accent2), var(--accent));
  border-radius: 99px;
  pointer-events: none;
  transition: width 0.1s;
}

input[type="range"] {
  position: relative;
  width: 100%;
  z-index: 1;
  -webkit-appearance: none;
  appearance: none;
  background: transparent;
  cursor: pointer;
  margin: 0;
}

input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 20px;
  height: 20px;
  border-radius: 50%;
  background: #fff;
  border: 2px solid var(--accent);
  box-shadow: 0 1px 6px rgba(64,48,17,0.15);
  transition: border-color 0.15s, box-shadow 0.15s;
}

input[type="range"]:focus::-webkit-slider-thumb {
  box-shadow: 0 0 0 3px rgba(204,145,77,0.2);
}

input[type="range"]::-moz-range-thumb {
  width: 20px;
  height: 20px;
  border-radius: 50%;
  background: #fff;
  border: 2px solid var(--accent);
  box-shadow: 0 1px 6px rgba(64,48,17,0.15);
}

.slider-labels {
  display: flex;
  justify-content: space-between;
  font-size: 11px;
  color: var(--text3);
  margin-top: 6px;
}

/* Error banner */
.error-banner {
  background: var(--danger-bg);
  border: 1px solid rgba(139,42,26,0.2);
  border-radius: var(--radius-sm);
  padding: 12px 14px;
  margin-bottom: 1rem;
  font-size: 13px;
  color: var(--danger);
  line-height: 1.6;
  display: none;
}
.error-banner.show { display: block; }
.error-banner ul { padding-left: 16px; margin-top: 6px; }
.error-banner li { margin-bottom: 3px; }

/* Submit button */
.submit-btn {
  width: 100%;
  padding: 14px;
  background: var(--text);
  color: #fff;
  border: none;
  border-radius: var(--radius-sm);
  font-size: 15px;
  font-weight: 500;
  font-family: 'Noto Sans TC', sans-serif;
  cursor: pointer;
  letter-spacing: 0.04em;
  transition: opacity 0.15s, transform 0.1s;
}
.submit-btn:hover { opacity: 0.85; }
.submit-btn:active { transform: scale(0.99); }

/* Result view */
#result-view { display: none; }

.result-summary {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 8px;
  margin-bottom: 1rem;
}

.r-cell {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 10px 12px;
}

.r-cell-full { grid-column: span 2; }
.r-cell-label { font-size: 11px; color: var(--text3); margin-bottom: 3px; }
.r-cell-value { font-size: 13px; font-weight: 500; color: var(--text); }
.r-cell-value.accent { color: var(--accent); }

/* Chart bars */
.chart-section {
  margin-top: 1.5rem;
}

.chart-title {
  font-size: 13px;
  font-weight: 500;
  color: var(--text);
  margin-bottom: 1rem;
}

.bar-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 12px;
}

.bar-label {
  font-size: 12px;
  color: var(--text2);
  width: 52px;
  flex-shrink: 0;
  text-align: right;
  line-height: 1.3;
}

.bar-track {
  flex: 1;
  height: 28px;
  background: var(--bg);
  border-radius: 6px;
  overflow: hidden;
  position: relative;
}

.bar-principal {
  position: absolute;
  left: 0;
  top: 0;
  height: 100%;
  background: var(--border2);
  border-radius: 6px;
  transition: width 0.6s ease;
}

.bar-interest {
  position: absolute;
  top: 0;
  height: 100%;
  background: linear-gradient(90deg, var(--accent2), var(--accent));
  border-radius: 0 6px 6px 0;
  transition: width 0.6s ease, left 0.6s ease;
}

.bar-value {
  font-size: 12px;
  color: var(--text);
  font-weight: 500;
  width: 80px;
  flex-shrink: 0;
  text-align: left;
}

.bar-age {
  font-size: 10px;
  color: var(--text3);
  width: 52px;
  flex-shrink: 0;
  text-align: right;
}

/* Table */
.table-wrap {
  overflow-x: auto;
  margin-top: 1rem;
}

table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}

thead tr {
  border-bottom: 1px solid var(--border);
}

thead th {
  padding: 8px 10px;
  text-align: right;
  font-size: 11px;
  font-weight: 500;
  color: var(--text3);
  letter-spacing: 0.05em;
}

thead th:first-child { text-align: left; }

tbody tr {
  border-bottom: 1px solid var(--border);
  transition: background 0.1s;
}

tbody tr:last-child { border-bottom: none; }

tbody tr:hover { background: rgba(204,145,77,0.04); }

tbody td {
  padding: 10px 10px;
  text-align: right;
  color: var(--text2);
}

tbody td:first-child {
  text-align: left;
  color: var(--text);
  font-weight: 500;
}

.td-highlight { color: var(--accent) !important; font-weight: 500 !important; }

/* Legend */
.legend {
  display: flex;
  gap: 16px;
  margin-bottom: 16px;
  flex-wrap: wrap;
}

.legend-item {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  color: var(--text2);
}

.legend-dot {
  width: 10px;
  height: 10px;
  border-radius: 3px;
  flex-shrink: 0;
}

.legend-dot.principal { background: var(--border2); }
.legend-dot.interest { background: linear-gradient(90deg, var(--accent2), var(--accent)); }

/* Milestone callout */
.milestone {
  background: var(--success-bg);
  border: 1px solid rgba(74,107,40,0.2);
  border-radius: var(--radius-sm);
  padding: 12px 14px;
  margin-top: 1rem;
  font-size: 13px;
  color: var(--success);
  line-height: 1.6;
}

.milestone strong { font-weight: 600; }

/* CTA */
.cta-card {
  background: linear-gradient(135deg, rgba(204,145,77,0.08) 0%, rgba(111,139,170,0.06) 100%);
  border: 1px solid rgba(204,145,77,0.25);
  border-radius: var(--radius);
  padding: 1.5rem;
  text-align: center;
  margin-bottom: 1rem;
  font-size: 14px;
  color: var(--text2);
  line-height: 1.75;
}

.cta-btn {
  display: inline-block;
  margin-top: 1rem;
  padding: 11px 24px;
  background: var(--text);
  color: #fff;
  border: none;
  border-radius: var(--radius-sm);
  font-size: 14px;
  font-weight: 500;
  font-family: 'Noto Sans TC', sans-serif;
  cursor: pointer;
  letter-spacing: 0.04em;
  transition: opacity 0.15s;
  text-decoration: none;
}

.cta-btn:hover { opacity: 0.85; }

.ig-link {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  font-size: 13px;
  color: var(--text3);
  text-decoration: none;
  margin-top: 10px;
}

.ig-link svg {
  width: 14px;
  height: 14px;
  stroke: var(--text3);
  fill: none;
  stroke-width: 1.5;
}

.back-btn {
  display: block;
  width: 100%;
  padding: 12px;
  background: transparent;
  border: 1px solid var(--border2);
  border-radius: var(--radius-sm);
  font-size: 14px;
  color: var(--text2);
  font-family: 'Noto Sans TC', sans-serif;
  cursor: pointer;
  margin-bottom: 1.5rem;
  transition: border-color 0.15s, color 0.15s;
}

.back-btn:hover { border-color: var(--text2); color: var(--text); }

.footer-note {
  text-align: center;
  font-size: 12px;
  color: var(--text3);
  margin-top: 0.5rem;
}

/* Total growth badge */
.growth-badge {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  font-size: 11px;
  padding: 2px 10px;
  border-radius: 99px;
  background: rgba(74,107,40,0.1);
  color: var(--success);
  border: 1px solid rgba(74,107,40,0.2);
  margin-left: 6px;
  font-weight: 500;
}
</style>
</head>
<body>

<div class="grid-bg">
  <svg xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">
    <defs>
      <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
        <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#C8BCA8" stroke-width="0.5"/>
      </pattern>
    </defs>
    <rect width="100%" height="100%" fill="url(#grid)"/>
  </svg>
</div>

<div class="page">
  <div class="header">
    <div class="brand-tag">
      <span class="brand-dot"></span>
      人生 × 金錢規劃 ｜ Gina
    </div>
    <h1>複利試算<br><em>讓時間幫你工作</em></h1>
    <p>輸入你的起始條件，看看每五年資產如何在複利的魔法下滾大</p>
  </div>

  <!-- Form View -->
  <div id="form-view">
    <div class="card">
      <div class="section-label">基本設定</div>

      <div class="field">
        <label>幾歲開始投資？</label>
        <span class="hint">你預計從幾歲開始這筆投資計畫</span>
        <div class="input-wrap has-suffix">
          <input type="number" id="start-age" placeholder="例：30" min="1" max="80">
          <span class="input-suffix">歲</span>
        </div>
        <div class="field-error" id="err-age"></div>
      </div>

      <div class="field">
        <label>初始本金</label>
        <span class="hint">目前打算投入的一次性資金（可以填 0）</span>
        <div class="input-wrap">
          <input type="number" id="principal" placeholder="例：200000" min="0">
        </div>
        <div class="field-error" id="err-principal"></div>
      </div>

      <div class="field">
        <label>每月投入</label>
        <span class="hint">每個月固定投入的金額</span>
        <div class="input-wrap">
          <input type="number" id="monthly" placeholder="例：10000" min="0">
        </div>
        <div class="field-error" id="err-monthly"></div>
      </div>
    </div>

    <div class="card">
      <div class="section-label">報酬率設定</div>

      <div class="field">
        <label>假設年化報酬率</label>
        <span class="hint">拖動滑桿選擇報酬率，或點選快速選項</span>

        <div class="rate-display">
          <span class="rate-value" id="rate-display">6%</span>
          <div class="rate-badges">
            <span class="rate-badge" onclick="setRate(3)">保守 3%</span>
            <span class="rate-badge active" onclick="setRate(6)">穩健 6%</span>
            <span class="rate-badge" onclick="setRate(10)">積極 10%</span>
          </div>
        </div>

        <div class="slider-track">
          <div class="slider-rail"><div class="slider-fill" id="slider-fill"></div></div>
          <input type="range" id="rate-slider" min="3" max="10" step="0.5" value="6" oninput="onSlider(this.value)">
        </div>
        <div class="slider-labels">
          <span>3%</span>
          <span>5%</span>
          <span>7%</span>
          <span>10%</span>
        </div>
      </div>
    </div>

    <div id="error-banner" class="error-banner">
      <strong>請確認以下欄位：</strong>
      <ul id="error-list"></ul>
    </div>

    <button class="submit-btn" onclick="calculate()">開始試算 →</button>
  </div>

  <!-- Result View -->
  <div id="result-view">
    <div id="result-content"></div>
    <button class="back-btn" onclick="goBack()">重新試算</button>
    <p class="footer-note">人生 × 金錢規劃 ｜ Gina</p>
  </div>
</div>

<script>
// Init slider fill
function updateSliderFill(val) {
  var pct = ((val - 3) / (10 - 3)) * 100;
  document.getElementById('slider-fill').style.width = pct + '%';
}
updateSliderFill(6);

function onSlider(val) {
  document.getElementById('rate-display').textContent = parseFloat(val) + '%';
  updateSliderFill(val);
  // clear badge active
  document.querySelectorAll('.rate-badge').forEach(function(b){ b.classList.remove('active'); });
  var v = parseFloat(val);
  if (v === 3 || v === 6 || v === 10) {
    document.querySelectorAll('.rate-badge').forEach(function(b){
      if (b.textContent.includes(v + '%')) b.classList.add('active');
    });
  }
}

function setRate(val) {
  document.getElementById('rate-slider').value = val;
  document.getElementById('rate-display').textContent = val + '%';
  updateSliderFill(val);
  document.querySelectorAll('.rate-badge').forEach(function(b){ b.classList.remove('active'); });
  event.target.classList.add('active');
}

function fmt(n) {
  if (n >= 100000000) return (n / 100000000).toFixed(1) + ' 億';
  if (n >= 10000) return Math.round(n / 10000) + ' 萬';
  return Math.round(n).toLocaleString();
}

function fmtFull(n) {
  return Math.round(n).toLocaleString();
}

function showErr(id, msg) {
  var el = document.getElementById(id);
  if (el) { el.textContent = msg; el.classList.add('show'); }
}

function calculate() {
  var startAge = parseInt(document.getElementById('start-age').value) || 0;
  var principal = parseFloat(document.getElementById('principal').value) || 0;
  var monthly = parseFloat(document.getElementById('monthly').value) || 0;
  var rate = parseFloat(document.getElementById('rate-slider').value) / 100;

  // Clear errors
  document.querySelectorAll('.field-error').forEach(function(el){ el.textContent=''; el.classList.remove('show'); });
  document.querySelectorAll('input').forEach(function(el){ el.classList.remove('error'); });
  document.getElementById('error-banner').classList.remove('show');

  var errors = [];

  if (!startAge || startAge < 1 || startAge > 80) {
    showErr('err-age', startAge ? '年齡請填入 1–80 之間' : '請填寫開始投資年齡');
    document.getElementById('start-age').classList.add('error');
    errors.push(startAge ? '年齡請填入 1–80 之間' : '請填寫開始投資年齡');
  }

  if (isNaN(principal) || principal < 0) {
    showErr('err-principal', '初始本金請填 0 或正整數');
    document.getElementById('principal').classList.add('error');
    errors.push('初始本金請填 0 或正整數');
  }

  if (monthly < 0) {
    showErr('err-monthly', '每月投入請填 0 或正整數');
    document.getElementById('monthly').classList.add('error');
    errors.push('每月投入請填 0 或正整數');
  }

  if (principal === 0 && monthly === 0) {
    showErr('err-monthly', '初始本金與每月投入不能同時為 0');
    document.getElementById('monthly').classList.add('error');
    errors.push('初始本金與每月投入不能同時為 0');
  }

  if (errors.length > 0) {
    var banner = document.getElementById('error-banner');
    var list = document.getElementById('error-list');
    list.innerHTML = errors.map(function(e){ return '<li>'+e+'</li>'; }).join('');
    banner.classList.add('show');
    banner.scrollIntoView({ behavior:'smooth', block:'center' });
    return;
  }

  // Calculate up to 50 years (every 5 years)
  var monthlyRate = rate / 12;
  var milestones = [];
  var maxYears = 50;

  for (var y = 5; y <= maxYears; y += 5) {
    var n = y * 12; // months
    // FV of lump sum + FV of monthly contributions
    var fvLump = principal * Math.pow(1 + monthlyRate, n);
    var fvMonthly = monthly === 0 ? 0 : monthly * (Math.pow(1 + monthlyRate, n) - 1) / monthlyRate;
    var total = fvLump + fvMonthly;
    var invested = principal + monthly * n;
    var interest = total - invested;
    milestones.push({
      year: y,
      age: startAge + y,
      total: total,
      invested: invested,
      interest: interest
    });
  }

  // Find max for bar scaling
  var maxTotal = milestones[milestones.length - 1].total;

  // Render result
  var rateLabel = rate === 0.03 ? '保守型（3%）' : rate === 0.06 ? '穩健型（6%）' : rate === 0.10 ? '積極型（10%）' : '自訂（' + (rate*100).toFixed(1) + '%）';
  var last = milestones[milestones.length - 1];
  var growthPct = last.invested > 0 ? ((last.total / last.invested - 1) * 100).toFixed(0) : 0;

  // Summary cells
  var summaryHTML =
    '<div class="result-summary">' +
    '<div class="r-cell"><div class="r-cell-label">開始年齡</div><div class="r-cell-value">' + startAge + ' 歲</div></div>' +
    '<div class="r-cell"><div class="r-cell-label">年化報酬率</div><div class="r-cell-value accent">' + (rate*100).toFixed(1) + '%</div></div>' +
    '<div class="r-cell"><div class="r-cell-label">初始本金</div><div class="r-cell-value">' + Math.round(principal).toLocaleString() + '</div></div>' +
    '<div class="r-cell"><div class="r-cell-label">每月投入</div><div class="r-cell-value">' + Math.round(monthly).toLocaleString() + '</div></div>' +
    '<div class="r-cell r-cell-full"><div class="r-cell-label">50 年後總資產</div>' +
    '<div class="r-cell-value accent" style="font-size:17px;">' + fmtFull(last.total) + '<span class="growth-badge">↑ ' + growthPct + '%</span></div></div>' +
    '</div>';

  // Bar chart
  var barsHTML = '<div class="legend"><div class="legend-item"><span class="legend-dot principal"></span>累計投入</div><div class="legend-item"><span class="legend-dot interest"></span>複利增值</div></div>';
  milestones.forEach(function(m) {
    var principalPct = (m.invested / maxTotal * 100).toFixed(1);
    var interestPct = (m.interest / maxTotal * 100).toFixed(1);
    barsHTML +=
      '<div class="bar-row">' +
      '<div class="bar-label">' + m.year + '年<br><span style="font-size:10px;color:var(--text3);">' + m.age + '歲</span></div>' +
      '<div class="bar-track">' +
      '<div class="bar-principal" style="width:' + principalPct + '%"></div>' +
      '<div class="bar-interest" style="left:' + principalPct + '%;width:' + interestPct + '%"></div>' +
      '</div>' +
      '<div class="bar-value">' + fmt(m.total) + '</div>' +
      '</div>';
  });

  // Table
  var tableHTML =
    '<div class="table-wrap"><table>' +
    '<thead><tr><th>年份</th><th>年齡</th><th>累計投入</th><th>複利增值</th><th>總資產</th></tr></thead>' +
    '<tbody>';
  milestones.forEach(function(m) {
    var isLast = m.year === 50;
    tableHTML +=
      '<tr>' +
      '<td>第 ' + m.year + ' 年</td>' +
      '<td>' + m.age + ' 歲</td>' +
      '<td>' + fmt(m.invested) + '</td>' +
      '<td class="' + (isLast ? 'td-highlight' : '') + '">' + fmt(m.interest) + '</td>' +
      '<td class="td-highlight">' + fmt(m.total) + '</td>' +
      '</tr>';
  });
  tableHTML += '</tbody></table></div>';

  // Find first milestone where interest > principal
  var flipMilestone = null;
  for (var i = 0; i < milestones.length; i++) {
    if (milestones[i].interest >= milestones[i].invested) {
      flipMilestone = milestones[i];
      break;
    }
  }
  var milestoneHTML = '';
  if (flipMilestone) {
    milestoneHTML = '<div class="milestone">🎯 大約在 <strong>' + flipMilestone.age + ' 歲（第 ' + flipMilestone.year + ' 年）</strong>，複利增值的金額將超越你親手投入的本金——從這一刻起，時間真正開始幫你賺錢。</div>';
  }

  // Assemble
  document.getElementById('result-content').innerHTML =
    '<div class="card">' +
    '<div class="section-label">試算設定</div>' +
    summaryHTML +
    '</div>' +
    '<div class="card">' +
    '<div class="section-label">每五年資產變化</div>' +
    '<div class="chart-title">資產組成：投入 vs 複利增值</div>' +
    barsHTML +
    milestoneHTML +
    '</div>' +
    '<div class="card">' +
    '<div class="section-label">詳細數據</div>' +
    tableHTML +
    '</div>' +
    '<div class="cta-card">' +
    '<p>試算是起點，不是終點。<br><strong>數字只有放進你的人生藍圖，才有意義。</strong><br><br>截圖這頁，私訊 Gina 一起規劃你的財務路徑。</p>' +
    '<button class="cta-btn" onclick="window.open(\'https://www.instagram.com/gina.freelife/\',\'_blank\')">私訊 Gina 討論 →</button><br>' +
    '<a class="ig-link" href="https://www.instagram.com/gina.freelife/" target="_blank">' +
    '<svg viewBox="0 0 24 24"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1112.63 8 4 4 0 0116 11.37z"/><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/></svg>' +
    '@gina.freelife</a>' +
    '</div>';

  document.getElementById('form-view').style.display = 'none';
  document.getElementById('result-view').style.display = 'block';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function goBack() {
  document.getElementById('form-view').style.display = 'block';
  document.getElementById('result-view').style.display = 'none';
  document.getElementById('result-content').innerHTML = '';
  document.querySelectorAll('input[type="number"]').forEach(function(el){ el.value = ''; el.classList.remove('error'); });
  document.querySelectorAll('.field-error').forEach(function(el){ el.textContent=''; el.classList.remove('show'); });
  document.getElementById('error-banner').classList.remove('show');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
</script>
</body>
</html>
